version: "3.9"

services:
  rag-backend:
    build: ./backend
    container_name: rag-chatbot-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - rag_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  rag_data:
