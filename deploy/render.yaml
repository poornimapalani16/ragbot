services:
  - type: web
    name: rag-chatbot-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODEL
        value: gemini-1.5-flash
      - key: GOOGLE_API_KEY
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
  