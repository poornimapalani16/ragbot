    Below is just a placeholder snippet so the file works out of the box.
  -->

    src="widget.js"
    data-bot-id="REPLACE_WITH_BOT_ID"
    data-api-key="REPLACE_WITH_API_KEY"
    data-api-base="https://your-app.up.railway.app">
  </script>
</body>
